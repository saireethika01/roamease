<!DOCTYPE html>
<html>
<head>
    <title>Login - RoamEase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

    <div class="auth-card">
        <div class="brand-logo-area">
            <img src="images/icon.png" class="brand-logo" width="32" height="32" alt="Logo">
            <span class="brand-name">RoamEase</span>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Please enter your details to sign in to your account</p>

        <!-- Dynamic Form Alert Banner -->
        <div id="authAlert" class="auth-alert hide"></div>

        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required autocomplete="email">
                </div>
                <span id="loginEmailError" class="field-error"></span>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword', this)">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <span id="loginPasswordError" class="field-error"></span>
            </div>

            <button type="submit" class="auth-submit-btn">
                <span class="spinner"></span>
                <span>Sign In</span>
            </button>
        </form>

        <span class="signup-link">
            Don't have an account? <a href="signup.html">Create an account</a>
        </span>
    </div>

    <script src="auth.js"></script>
</body>
</html>
